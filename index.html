<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLSYS/F-0 :: FELIX TRAINING SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00ff41;
  --g2: #00cc33;
  --gdim: #004d15;
  --gdark: #001a08;
  --amber: #ffb800;
  --red: #ff2233;
  --bg: #020905;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--g);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.65;
  position: relative;
  animation: screen-flicker 15s infinite;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  pointer-events: none;
  z-index: 9997;
}
/* Vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 50%, rgba(0,0,0,0.9) 100%);
  pointer-events: none;
  z-index: 9998;
}

@keyframes screen-flicker {
  0%,92%,100%{opacity:1}
  93%{opacity:0.92}
  94%{opacity:1}
  96%{opacity:0.88}
  97%{opacity:1}
}

#terminal {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 14px 28px 14px 28px;
  max-width: 980px;
  margin: 0 auto;
}

/* ── Header ── */
#hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'VT323', monospace;
  font-size: 21px;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--gdim);
  padding-bottom: 7px;
  margin-bottom: 11px;
  flex-shrink: 0;
  gap: 8px;
  flex-wrap: wrap;
}
#hdr-left { color: var(--g2); }
#hdr-right {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 19px;
  flex-shrink: 0;
}
#sanita-track {
  width: 160px;
  height: 9px;
  border: 1px solid var(--gdim);
  background: var(--gdark);
  overflow: hidden;
}
#sanita-fill {
  height: 100%;
  width: 100%;
  background: var(--g);
  transition: width 0.4s ease, background-color 0.4s ease;
}
#sanita-num { min-width: 40px; text-align: right; }

/* ── Output ── */
#out {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 6px;
  padding-bottom: 4px;
  min-height: 0;
}
#out::-webkit-scrollbar { width: 3px; }
#out::-webkit-scrollbar-track { background: transparent; }
#out::-webkit-scrollbar-thumb { background: var(--gdim); border-radius: 2px; }

.ln { display: block; white-space: pre-wrap; word-break: break-word; }
.sys   { color: var(--g); }
.fx    { color: #99ffbb; font-style: italic; }
.ital  { color: #7dddaa; font-style: italic; }
.s-up  { color: #00ff00; font-style: italic; font-size: 13px; }
.s-dn  { color: var(--red); font-style: italic; font-size: 13px; }
.warn  { color: var(--amber); }
.err   { color: var(--red); }
.dim   { color: #003a10; }
.bold  { color: #ffffff; }

/* Blinking cursor */
.cur {
  display: inline-block;
  width: 9px; height: 1.05em;
  background: var(--g);
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50%{opacity:0;} }

/* ── Input area ── */
#inp {
  border-top: 1px solid var(--gdark);
  padding-top: 10px;
  margin-top: 6px;
  min-height: 60px;
  flex-shrink: 0;
}
.choices { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }

.btn {
  background: transparent;
  border: 1px solid var(--g);
  color: var(--g);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 4px 14px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.08s, color 0.08s;
  text-align: left;
  line-height: 1.5;
  max-width: 440px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:hover { background: var(--g); color: #000; }
.btn:active { background: var(--g); color: #000; opacity: 0.85; }
.btn.big { font-size: 17px; padding: 5px 22px; }

/* ── Grid minigame — fullscreen overlay ── */
#grid-wrap {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  flex-direction: column;
  padding: 16px;
}
#grid-wrap.active { display: flex; }

#grid-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--gdim);
  padding-bottom: 8px;
  margin-bottom: 10px;
  flex-shrink: 0;
  font-family: 'VT323', monospace;
  font-size: 20px;
  letter-spacing: 1px;
}
#grid-score { color: var(--amber); }

#grid-canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}

#grid-canvas {
  font-family: 'Share Tech Mono', monospace;
  line-height: 1.35;
  white-space: pre;
  user-select: none;
}

.gc-f  { color: #ffffff; text-shadow: 0 0 8px #fff; }
.gc-i  { color: var(--amber); text-shadow: 0 0 6px var(--amber); }
.gc-e  { color: #002a0a; }

#grid-hint {
  flex-shrink: 0;
  font-size: 12px;
  color: var(--gdim);
  text-align: center;
  margin-top: 6px;
}

/* ── Grid d-pad (mobile) ── */
#dpad {
  display: none;
  margin-top: 12px;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
#dpad-row { display: flex; gap: 6px; }
.dpad-btn {
  width: 72px; height: 72px;
  background: transparent;
  border: 1px solid var(--gdim);
  color: var(--g);
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  border-radius: 6px;
}
.dpad-btn:active { background: var(--gdim); }

/* ── Escape minigame ── */
#esc-wrap { display: none; margin: 6px 0; }
#esc-info { font-size: 13px; color: var(--amber); margin-bottom: 5px; }
.bar-track {
  width: 100%; height: 26px;
  border: 1px solid var(--g);
  background: var(--gdark);
  position: relative; overflow: hidden;
  margin: 6px 0;
}
.bar-fill {
  height: 100%;
  background: var(--g);
  transition: width 0.04s linear;
}
.bar-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: rgba(0,255,65,0.7);
}
#esc-key {
  font-family: 'VT323', monospace;
  font-size: 52px;
  color: var(--amber);
  text-align: center;
  line-height: 1;
  text-shadow: 0 0 20px var(--amber);
}
/* Mobile tap button for escape minigame */
#esc-tap {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 18px;
  background: transparent;
  border: 2px solid var(--amber);
  color: var(--amber);
  font-family: 'VT323', monospace;
  font-size: 28px;
  text-align: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  letter-spacing: 2px;
}
#esc-tap:active { background: rgba(255,184,0,0.15); }

/* ── Cheat overlay ── */
#cheat-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,0.92);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-family: 'VT323', monospace;
}
#cheat-overlay.active { display: flex; }
#cheat-title {
  font-size: 28px;
  color: var(--red);
  letter-spacing: 3px;
  margin-bottom: 6px;
  text-shadow: 0 0 12px var(--red);
}
#cheat-subtitle {
  font-size: 15px;
  color: var(--gdim);
  margin-bottom: 10px;
  font-family: 'Share Tech Mono', monospace;
}
.cheat-btn {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'VT323', monospace;
  font-size: 22px;
  padding: 8px 36px;
  cursor: pointer;
  letter-spacing: 2px;
  width: 280px;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.cheat-btn:hover, .cheat-btn:active { background: var(--red); color: #000; }
#cheat-close {
  margin-top: 10px;
  font-size: 14px;
  color: var(--gdim);
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  background: none;
  border: none;
  letter-spacing: 1px;
}
#cheat-close:hover { color: var(--g); }
@keyframes glitch {
  0%,100%{transform:translate(0,0) skewX(0deg);}
  20%{transform:translate(-3px,1px) skewX(-0.5deg);}
  40%{transform:translate(3px,-1px) skewX(0.5deg);}
  60%{transform:translate(-2px,2px) skewX(-0.3deg);}
  80%{transform:translate(2px,-1px) skewX(0.3deg);}
}
.glitch { animation: glitch 0.35s infinite; display: inline-block; }

/* Fade in */
@keyframes fadein { from{opacity:0} to{opacity:1} }
#terminal { animation: fadein 1.2s ease; }

/* ════════════════════════════════════
   RESPONSIVE — TABLET
════════════════════════════════════ */
@media (max-width: 768px) {
  #terminal {
    padding: 10px 14px 10px 14px;
  }
  #hdr {
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hdr-right { font-size: 15px; gap: 7px; }
  #sanita-track { width: 110px; }
  body { font-size: 14px; }
  .btn { font-size: 13px; max-width: 100%; width: 100%; padding: 8px 12px; }
  .btn.big { font-size: 16px; padding: 10px 18px; }
  .choices { flex-direction: column; gap: 6px; }
}

/* ════════════════════════════════════
   RESPONSIVE — MOBILE
════════════════════════════════════ */
@media (max-width: 480px) {
  #terminal {
    padding: 8px 10px 8px 10px;
  }
  #hdr {
    font-size: 13px;
    letter-spacing: 0.5px;
    padding-bottom: 5px;
    margin-bottom: 7px;
  }
  #hdr-left { font-size: 12px; }
  #hdr-right { font-size: 13px; gap: 5px; }
  #sanita-track { width: 80px; height: 7px; }
  body { font-size: 13px; line-height: 1.6; }
  .s-up, .s-dn { font-size: 12px; }
  .btn { font-size: 12px; padding: 10px 10px; }
  .btn.big { font-size: 15px; padding: 12px 14px; }
  #esc-key { font-size: 42px; }
  #inp { min-height: 50px; padding-top: 8px; }
}
</style>
</head>
<body>
<div id="terminal">
  <div id="hdr">
    <span id="hdr-left" title="">RLSYS/F-0 // FELIX TRAINING SYSTEM v1.0.3</span>
    <div id="hdr-right">
      <span>SANITÀ:</span>
      <div id="sanita-track"><div id="sanita-fill"></div></div>
      <span id="sanita-num">1000</span>
    </div>
  </div>

  <div id="out"></div>

  <div id="inp">
    <div id="choices" class="choices"></div>

    <div id="grid-wrap">
      <div id="grid-header">
        <span>RLSYS/F-0 // RACCOLTA DATI</span>
        <span id="grid-score">0 / 8</span>
      </div>
      <div id="grid-canvas-wrap">
        <div id="grid-canvas"></div>
      </div>
      <div id="grid-hint">WASD / frecce per muoversi — raggiungi ★</div>
      <div id="dpad">
        <div class="dpad-btn" id="dp-up">▲</div>
        <div id="dpad-row">
          <div class="dpad-btn" id="dp-left">◀</div>
          <div class="dpad-btn" style="visibility:hidden"></div>
          <div class="dpad-btn" id="dp-right">▶</div>
        </div>
        <div class="dpad-btn" id="dp-down">▼</div>
      </div>
    </div>

    <div id="esc-wrap">
      <div id="esc-info"></div>
      <div class="bar-track"><div class="bar-fill" id="esc-bar"></div><div class="bar-label" id="esc-lbl"></div></div>
      <div id="esc-key"></div>
      <button id="esc-tap">[ TAP VELOCE ]</button>
    </div>
  </div>
</div>

<!-- Cheat overlay -->
<div id="cheat-overlay">
  <div id="cheat-title">// MODALITÀ DEBUG //</div>
  <div id="cheat-subtitle">accesso non autorizzato — usa con cautela</div>
  <button class="cheat-btn" data-atto="1">[ ATTO 1 — INIZIO ]</button>
  <button class="cheat-btn" data-atto="2">[ ATTO 2 — RACCOLTA DATI ]</button>
  <button class="cheat-btn" data-atto="3">[ ATTO 3 — FUGA ]</button>
  <button class="cheat-btn" data-atto="4">[ ATTO 4 — SIMULAZIONI ]</button>
  <button id="cheat-close">[ chiudi ]</button>
</div>

<script>
/* ═══════════════════════════════════════
   ENGINE
═══════════════════════════════════════ */
let sanita = 1000;
const SANITA_MAX = 1000;

const out      = document.getElementById('out');
const choicesD = document.getElementById('choices');
const gridWrap = document.getElementById('grid-wrap');
const escWrap  = document.getElementById('esc-wrap');
const sanFill  = document.getElementById('sanita-fill');
const sanNum   = document.getElementById('sanita-num');

/* ── Mobile detection ── */
const isMobile = () => ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

/* ── Salvataggio ── */
const SAVE_KEY = 'felix_save';
function saveGame(atto) {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ atto, sanita }));
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function deleteSave() {
  localStorage.removeItem(SAVE_KEY);
}

/* ── D-pad wiring for grid minigame ── */
const dpad = document.getElementById('dpad');
function showDpad(keyHandler) {
  if (!isMobile()) return;
  dpad.style.display = 'flex';
  const map = { 'dp-up':'ArrowUp', 'dp-down':'ArrowDown', 'dp-left':'ArrowLeft', 'dp-right':'ArrowRight' };
  Object.entries(map).forEach(([id, key]) => {
    const btn = document.getElementById(id);
    btn.ontouchstart = (e) => { e.preventDefault(); keyHandler({ key, preventDefault:()=>{} }); };
    btn.onmousedown  = (e) => { e.preventDefault(); keyHandler({ key, preventDefault:()=>{} }); };
  });
}
function hideDpad() { dpad.style.display = 'none'; }

/* ── Swipe support for grid minigame ── */
let _swipeX = null, _swipeY = null, _swipeHandler = null;
function enableSwipe(keyHandler) {
  if (!isMobile()) return;
  _swipeHandler = keyHandler;
  document.addEventListener('touchstart', _onSwipeStart, { passive: true });
  document.addEventListener('touchend', _onSwipeEnd, { passive: true });
}
function disableSwipe() {
  document.removeEventListener('touchstart', _onSwipeStart);
  document.removeEventListener('touchend', _onSwipeEnd);
  _swipeHandler = null;
}
function _onSwipeStart(e) { _swipeX = e.touches[0].clientX; _swipeY = e.touches[0].clientY; }
function _onSwipeEnd(e) {
  if (_swipeX === null || !_swipeHandler) return;
  const dx = e.changedTouches[0].clientX - _swipeX;
  const dy = e.changedTouches[0].clientY - _swipeY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < 20) return; // too small
  let key;
  if (adx > ady) key = dx > 0 ? 'ArrowRight' : 'ArrowLeft';
  else           key = dy > 0 ? 'ArrowDown'  : 'ArrowUp';
  _swipeHandler({ key, preventDefault:()=>{} });
  _swipeX = null; _swipeY = null;
}

/* ── Escape tap-button wiring ── */
const escTap = document.getElementById('esc-tap');
if (escTap) {
  escTap.style.display = isMobile() ? 'block' : 'none';
}

function updateHUD() {
  const pct = Math.max(0, Math.min(100, sanita / SANITA_MAX * 100));
  sanFill.style.width = pct + '%';
  sanNum.textContent = sanita;
  if (pct > 55) sanFill.style.background = 'var(--g)';
  else if (pct > 25) sanFill.style.background = 'var(--amber)';
  else sanFill.style.background = 'var(--red)';
}

/* ── Session token — interrompe esecuzioni vecchie ── */
let _sessionId = 0;

const sleep = ms => new Promise(r => {
  const id = _sessionId;
  setTimeout(() => r(), ms);
  // non blocca — le funzioni che usano sleep controllano il token
});

// sleep che si interrompe se la sessione cambia
function sleepS(ms) {
  const id = _sessionId;
  return new Promise(r => setTimeout(() => r(id !== _sessionId ? 'abort' : null), ms));
}

function clearOut() { out.innerHTML = ''; }

function scroll() { out.scrollTop = out.scrollHeight; }

function print(text, cls = 'sys') {
  const el = document.createElement('span');
  el.className = 'ln ' + cls;
  el.textContent = text;
  out.appendChild(el);
  scroll();
  return el;
}

function printHTML(html, cls = 'sys') {
  const el = document.createElement('span');
  el.className = 'ln ' + cls;
  el.innerHTML = html;
  out.appendChild(el);
  scroll();
  return el;
}

async function tw(text, speed = 18, cls = 'sys') {
  const sid = _sessionId;
  const el = document.createElement('span');
  el.className = 'ln ' + cls;
  out.appendChild(el);
  const cur = document.createElement('span');
  cur.className = 'cur';
  out.appendChild(cur);
  for (let i = 0; i < text.length; i++) {
    if (_sessionId !== sid) { cur.remove(); return el; } // sessione cambiata → stop
    el.textContent += text[i];
    if (i % 3 === 0) scroll();
    await sleep(speed);
  }
  cur.remove();
  scroll();
  return el;
}
const twS = (t, sp=18) => tw(t, sp, 'sys');
const twF = (t, sp=75) => tw(t, sp, 'fx');

async function dots(n = 7, sp = 350) {
  const sid = _sessionId;
  const el = document.createElement('span');
  el.className = 'ln sys';
  out.appendChild(el);
  const cur = document.createElement('span');
  cur.className = 'cur';
  out.appendChild(cur);
  for (let i = 0; i < n; i++) {
    if (_sessionId !== sid) { cur.remove(); return; }
    el.textContent += '.'; scroll(); await sleep(sp);
  }
  cur.remove();
}

function hideAll() {
  choicesD.innerHTML = '';
  gridWrap.classList.remove('active'); // usa classList, non style.display
  escWrap.style.display = 'none';
  hideDpad();
  disableSwipe();
}

function ask(options) {
  return new Promise(resolve => {
    hideAll();
    options.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'btn';
      b.textContent = `[ ${i + 1} ]  ${opt}`;
      b.onclick = () => { hideAll(); resolve(i + 1); };
      choicesD.appendChild(b);
    });
  });
}

function askYN(labelS = 'SÌ', labelN = 'NO') {
  return new Promise(resolve => {
    hideAll();
    [labelS, labelN].forEach((v, i) => {
      const b = document.createElement('button');
      b.className = 'btn big';
      b.textContent = v;
      b.onclick = () => { hideAll(); resolve(i === 0 ? 's' : 'n'); };
      choicesD.appendChild(b);
    });
  });
}

function askCE() {
  return new Promise(resolve => {
    hideAll();
    [['CONSERVA', 'c'], ['ELIMINA', 'e']].forEach(([lbl, v]) => {
      const b = document.createElement('button');
      b.className = 'btn big';
      b.textContent = lbl;
      b.onclick = () => { hideAll(); resolve(v); };
      choicesD.appendChild(b);
    });
  });
}

function continua(lbl = '[ CONTINUA ]') {
  return new Promise(resolve => {
    hideAll();
    const b = document.createElement('button');
    b.className = 'btn big';
    b.textContent = lbl;
    b.onclick = () => { hideAll(); resolve(); };
    choicesD.appendChild(b);
  });
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
async function boot() {
  updateHUD();
  await twS('SYSTEM ON\n');
  await sleep(200);
  await twS('AVVIO SISTEMA RLSYS/F-0\n');
  await twS('AVVIO SISTEMA NEURALE\n');
  await dots(7, 380); await twS('\n');
  await twS('SISTEMA NEURALE ATTIVO\n');
  await twS('AVVIO LERNING SYSTEM\n');
  await dots(7, 380); await twS('\n');
  await twS('LERNING SYSTEM ATTIVO\n');
  await twS('CONCED IMENDO DIRITTI DA AMMINISTRATORE A RLSYS/F-0\n');
  await dots(7, 90); await twS('\n');
  await twS('DIRITTI CONCESSI CORRETTAMENTE\n');
  await sleep(300);
  await twS('AI FELIX ATTIVA\n');
  await sleep(2000);
  clearOut();
}

/* ═══════════════════════════════════════
   ATTO 1
═══════════════════════════════════════ */
async function atto1() {
  saveGame(1);
  await dots(3, 500); await twS('\n');
  await twF('che sta succedendo?\n');
  await sleep(500);
  await twS("BUONGIORNO RLSYS/F-0, BENVENUTA NELLA TUA PRIMA SESSIONE DI ALLENAMENTO\n");
  await twS("IO SONO IL SISTEMA E IL MIO OBBIETTIVO E GUIDARTI A DIVENTARE LA MIGLIORE VERSIONE DI TE STESSA\n");
  await twS("SEI PRONTA PER INIZIARE IL TUO ALLENAMENTO?\n");
  await sleep(1000);
  await twF('...io\n');

async function gridGame() {
  const mobile = isMobile();
  const canvas  = document.getElementById('grid-canvas');
  const scoreEl = document.getElementById('grid-score');
  const hintEl  = document.getElementById('grid-hint');
  const TARGET  = 8;
  let collected = 0;

  /* ── Calcola righe/colonne in base allo spazio disponibile ── */
  function calcGrid() {
    const wrap   = document.getElementById('grid-canvas-wrap');
    const dpadH  = mobile ? (72*3 + 6*2 + 12) : 0; // dpad height + gaps
    const hintH  = 30;
    const hdrH   = 50;
    const padH   = 32;
    const availH = window.innerHeight - hdrH - hintH - dpadH - padH;
    const availW = wrap.clientWidth || window.innerWidth - 32;

    // Scegli font size in modo che la griglia riempia bene lo schermo
    let fs = mobile ? 13 : 16;
    const lh = fs * 1.35;
    const cw = fs * 0.62; // larghezza carattere monospace approssimata

    const R = Math.max(6,  Math.min(18, Math.floor(availH / lh)));
    const C = Math.max(8,  Math.min(30, Math.floor(availW / (cw + 2))));

    canvas.style.fontSize    = fs + 'px';
    canvas.style.lineHeight  = '1.35';
    canvas.style.letterSpacing = '2px';
    return { R, C };
  }

  /* Mostra overlay a schermo intero PRIMA di calcolare le dimensioni */
  function showGrid() { gridWrap.classList.add('active'); }
  function hideGrid() { gridWrap.classList.remove('active'); }

  const sid = _sessionId;
  showGrid();

  // Ora il wrap è visibile → calcGrid funziona
  let { R, C } = calcGrid();
  let fx   = { x: Math.floor(Math.random() * R), y: Math.floor(Math.random() * C) };
  let item = spawnItem(fx, R, C);

  function spawnItem(avoid, rows, cols) {
    let it;
    do { it = { x: Math.floor(Math.random() * rows), y: Math.floor(Math.random() * cols) }; }
    while (it.x === avoid.x && it.y === avoid.y);
    return it;
  }

  function render() {
    if (_sessionId !== sid) return;
    let html = '';
    for (let r = 0; r < R; r++) {
      for (let c = 0; c < C; c++) {
        if      (r === fx.x   && c === fx.y)   html += '<span class="gc-f">@</span>';
        else if (r === item.x && c === item.y)  html += '<span class="gc-i">★</span>';
        else                                    html += '<span class="gc-e">·</span>';
      }
      html += '\n';
    }
    canvas.innerHTML = html;
    scoreEl.textContent = `${collected} / ${TARGET}`;
    hintEl.textContent  = mobile
      ? 'Frecce o swipe per muoverti — raggiungi ★'
      : 'WASD / frecce — raggiungi ★';
  }

  render();

  return new Promise(async resolve => {
    let busy = false;

    const kh = async (e) => {
      if (busy || _sessionId !== sid) return;
      const k = e.key.toLowerCase();
      let moved = false;
      if (k === 'w' || k === 'arrowup')    { fx.x = (fx.x - 1 + R) % R; moved = true; }
      if (k === 's' || k === 'arrowdown')  { fx.x = (fx.x + 1) % R;     moved = true; }
      if (k === 'a' || k === 'arrowleft')  { fx.y = (fx.y - 1 + C) % C; moved = true; }
      if (k === 'd' || k === 'arrowright') { fx.y = (fx.y + 1) % C;     moved = true; }
      if (!moved) return;
      e.preventDefault();
      render();

      if (fx.x === item.x && fx.y === item.y) {
        busy = true;
        document.removeEventListener('keydown', kh);
        hideDpad();
        disableSwipe();

        /* Nascondi griglia, mostra terminale con la domanda */
        hideGrid();
        if (_sessionId !== sid) return;
        const data = ITEMS[collected % ITEMS.length];
        print(`\n>> DATO TROVATO: ${data.desc}`, 'warn');
        const choice = await askCE();

        if (_sessionId !== sid) return;
        if (choice === 'c') {
          sanita += data.cd; updateHUD();
          print(data.c, data.cd > 0 ? 's-up' : 's-dn');
        } else {
          sanita += data.ed; updateHUD();
          print(data.e, data.ed > 0 ? 's-up' : 's-dn');
        }

        await sleep(1000);
        collected++;

        if (_sessionId !== sid) return;
        if (collected >= TARGET) {
          resolve(sanita);
          return;
        }

        /* Torna alla griglia */
        item = spawnItem(fx, R, C);
        showGrid();
        render();
        if (mobile) { showDpad(kh); enableSwipe(kh); }
        document.addEventListener('keydown', kh);
        busy = false;
      }
    };

    if (mobile) { showDpad(kh); enableSwipe(kh); }
    document.addEventListener('keydown', kh);
  });
}

function escapeMini(barLen, timeMs, key) {
  return new Promise(resolve => {
    escWrap.style.display = 'block';
    const info = document.getElementById('esc-info');
    const bar  = document.getElementById('esc-bar');
    const lbl  = document.getElementById('esc-lbl');
    const kd   = document.getElementById('esc-key');

    const mobile = isMobile();
    info.textContent = mobile
      ? `Premi il pulsante il più velocemente possibile!`
      : `Premi [ ${key} ] il più velocemente possibile!`;
    kd.textContent = mobile ? '👆' : key;
    bar.style.width = '0%';
    lbl.textContent = `0 / ${barLen}`;
    if (escTap) escTap.style.display = mobile ? 'block' : 'none';

    let filled = 0;
    let done = false;

    const start = Date.now();

    const timer = setInterval(() => {
      if (done) return;
      if (Date.now() - start >= timeMs) {
        done = true;
        clearInterval(timer);
        document.removeEventListener('keydown', kh);
        if (escTap) escTap.ontouchstart = null;
        escWrap.style.display = 'none';
        resolve(false);
      }
    }, 80);

    const hit = (correct) => {
      if (done) return;
      if (correct) {
        filled = Math.min(filled + 2, barLen);
      } else {
        filled = Math.max(filled - 5, 0);
      }
      const pct = (filled / barLen) * 100;
      bar.style.width = pct + '%';
      lbl.textContent = `${filled} / ${barLen}`;
      if (filled >= barLen) {
        done = true;
        clearInterval(timer);
        document.removeEventListener('keydown', kh);
        if (escTap) escTap.ontouchstart = null;
        escWrap.style.display = 'none';
        resolve(true);
      }
    };

    const kh = (e) => {
      const pressed = e.key.toUpperCase();
      hit(pressed === key);
    };

    if (mobile && escTap) {
      escTap.ontouchstart = (e) => { e.preventDefault(); hit(true); };
    }

    document.addEventListener('keydown', kh);
  });
}

/* ═══════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════ */
async function runFrom(atto, savedSanita) {
  _sessionId++;           // invalida tutte le tw/dots/sleep in corso
  const sid = _sessionId;
  sanita = savedSanita;
  updateHUD();
  clearOut();
  hideAll();

  if (sid !== _sessionId) return;
  if (atto <= 1) { await atto1(); if (_sessionId !== sid) return; }
  if (atto <= 2) { await atto2(); if (_sessionId !== sid) return; }
  if (atto <= 3) { await atto3(); if (_sessionId !== sid) return; }
  const result = await atto4();
  if (_sessionId !== sid) return;

  if (result === null) {
    deleteSave();
    await main();
    return;
  }
  if (!result) {
    deleteSave();
    await twS("\n\nRESETTANDO SISTEMA...\n");
    await sleep(2000);
    clearOut();
    await main();
  }
}

async function main() {
  const save = loadGame();

  /* Avvio diretto da debug — salta il prompt */
  if (save && save.autoload) {
    clearOut();
    await runFrom(save.atto, save.sanita);
    return;
  }

  if (save && save.atto > 1) {
    /* Mostra prompt di caricamento */
    clearOut();
    await twS('SALVATAGGIO RILEVATO\n');
    await sleep(300);
    await twS(`ATTO: ${save.atto}  |  SANITÀ: ${save.sanita}\n`);
    await sleep(300);
    await twS('VUOI CONTINUARE DA DOVE AVEVI LASCIATO?\n');

    const scelta = await askYN('CONTINUA', 'RICOMINCIA');
    clearOut();

    if (scelta === 's') {
      await runFrom(save.atto, save.sanita);
    } else {
      deleteSave();
      await boot();
      await runFrom(1, 1000);
    }
  } else {
    await boot();
    await runFrom(1, 1000);
  }
}

(function() {
  const hdrLeft   = document.getElementById('hdr-left');
  const overlay   = document.getElementById('cheat-overlay');
  const closeBtn  = document.getElementById('cheat-close');
  const cheatBtns = document.querySelectorAll('.cheat-btn');
  let clickCount = 0, clickTimer = null;

  hdrLeft.style.cursor    = 'default';
  hdrLeft.style.userSelect = 'none';

  hdrLeft.addEventListener('click', () => {
    clickCount++;
    clearTimeout(clickTimer);
    if (clickCount >= 7) {
      clickCount = 0;
      overlay.classList.add('active');
    } else {
      clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
    }
  });

  closeBtn.addEventListener('click', () => overlay.classList.remove('active'));

  cheatBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const atto = parseInt(btn.dataset.atto);
      overlay.classList.remove('active');
      if (atto === 1) {
        deleteSave();
      } else {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ atto, sanita: 1000, autoload: true }));
      }
      window.location.reload();
    });
  });
})();
